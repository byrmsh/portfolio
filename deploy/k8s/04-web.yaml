apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-deployment
  namespace: portfolio
  labels:
    app: portfolio
    component: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portfolio
      component: web
  template:
    metadata:
      labels:
        app: portfolio
        component: web
    spec:
      containers:
        - name: web
          image: portfolio-web:dev
          imagePullPolicy: IfNotPresent
          env:
            - name: HOST
              value: 0.0.0.0
            - name: PORT
              value: "8080"
            - name: API_ORIGIN
              value: http://api-service:3000
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 256Mi
              cpu: 500m
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 30
            periodSeconds: 2
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: web-service
  namespace: portfolio
  labels:
    app: portfolio
    component: web
spec:
  type: ClusterIP
  selector:
    app: portfolio
    component: web
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: http
