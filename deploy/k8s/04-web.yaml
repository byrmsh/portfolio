apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-deployment
  namespace: portfolio
  labels:
    app: portfolio
    component: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portfolio
      component: web
  template:
    metadata:
      labels:
        app: portfolio
        component: web
    spec:
      containers:
      - name: web
        image: ghcr.io/byrmsh/portfolio-web:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: web-service
  namespace: portfolio
  labels:
    app: portfolio
    component: web
spec:
  selector:
    app: portfolio
    component: web
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
