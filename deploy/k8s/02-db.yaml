apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: db-statefulset
  namespace: portfolio
  labels:
    app: portfolio
    component: db
spec:
  serviceName: "db"
  replicas: 1
  selector:
    matchLabels:
      app: portfolio
      component: db
  template:
    metadata:
      labels:
        app: portfolio
        component: db
    spec:
      containers:
      - name: dragonfly
        image: docker.dragonflydb.io/dragonflydb/dragonfly
        ports:
        - containerPort: 6379
          name: redis
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          tcpSocket:
            port: 6379
          initialDelaySeconds: 5
        readinessProbe:
          tcpSocket:
            port: 6379
          initialDelaySeconds: 3
        volumeMounts:
        - name: db-storage
          mountPath: /data
  volumeClaimTemplates:
  - metadata:
      name: db-storage
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: db
  namespace: portfolio
  labels:
    app: portfolio
    component: db
spec:
  clusterIP: None
  ports:
  - port: 6379
    targetPort: 6379
  selector:
    app: portfolio
    component: db
