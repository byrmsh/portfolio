apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: db-pvc
  namespace: portfolio
  labels:
    app: portfolio
    component: db
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db-deployment
  namespace: portfolio
  labels:
    app: portfolio
    component: db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portfolio
      component: db
  template:
    metadata:
      labels:
        app: portfolio
        component: db
    spec:
      containers:
        - name: dragonfly
          image: docker.dragonflydb.io/dragonflydb/dragonfly:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: redis
              containerPort: 6379
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 3
            periodSeconds: 5
          volumeMounts:
            - name: db-storage
              mountPath: /data
      volumes:
        - name: db-storage
          persistentVolumeClaim:
            claimName: db-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: db-service
  namespace: portfolio
  labels:
    app: portfolio
    component: db
spec:
  type: ClusterIP
  selector:
    app: portfolio
    component: db
  ports:
    - name: redis
      protocol: TCP
      port: 6379
      targetPort: redis
