apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deployment
  namespace: portfolio
  labels:
    app: portfolio
    component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portfolio
      component: api
  template:
    metadata:
      labels:
        app: portfolio
        component: api
    spec:
      containers:
      - name: api
        image: ghcr.io/byrmsh/portfolio-api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: portfolio
  labels:
    app: portfolio
    component: api
spec:
  selector:
    app: portfolio
    component: api
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
