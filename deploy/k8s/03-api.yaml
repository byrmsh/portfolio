apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deployment
  namespace: portfolio
  labels:
    app: portfolio
    component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portfolio
      component: api
  template:
    metadata:
      labels:
        app: portfolio
        component: api
    spec:
      containers:
        - name: api
          image: portfolio-api:dev
          imagePullPolicy: IfNotPresent
          env:
            - name: REDIS_URL
              value: redis://db-service:6379/0
            - name: PORT
              value: "3000"
          ports:
            - name: http
              containerPort: 3000
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 256Mi
              cpu: 500m
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 30
            periodSeconds: 2
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: portfolio
  labels:
    app: portfolio
    component: api
spec:
  type: ClusterIP
  selector:
    app: portfolio
    component: api
  ports:
    - name: http
      protocol: TCP
      port: 3000
      targetPort: http
