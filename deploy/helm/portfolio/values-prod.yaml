api:
  image:
    repository: ghcr.io/byrmsh/portfolio-api
    tag: 6f55bdd9371149c70255b433b9c4f5f37eb2f7a6
    pullPolicy: Always

web:
  image:
    repository: ghcr.io/byrmsh/portfolio-web
    tag: 6f55bdd9371149c70255b433b9c4f5f37eb2f7a6
    pullPolicy: Always

collectorCronJobs:
  jobs:
  - name: collector-github-cronjob
    component: collector
    schedule: '15 3 * * *'
    suspend: true
    image:
      repository: ghcr.io/byrmsh/portfolio-collector
      tag: 6f55bdd9371149c70255b433b9c4f5f37eb2f7a6
      pullPolicy: Always
    command:
    - python
    - github_activity.py
    secretRef: collector-secrets
  - name: collector-anki-cronjob
    component: collector
    schedule: '5 * * * *'
    suspend: true
    image:
      repository: ghcr.io/byrmsh/portfolio-ankiworker
      tag: 6f55bdd9371149c70255b433b9c4f5f37eb2f7a6
      pullPolicy: Always
    command:
    - python
    - anki_activity.py
    secretRef: collector-secrets
  - name: collector-cluster-cronjob
    component: collector
    schedule: '*/10 * * * *'
    suspend: true
    image:
      repository: ghcr.io/byrmsh/portfolio-collector
      tag: 6f55bdd9371149c70255b433b9c4f5f37eb2f7a6
      pullPolicy: Always
    command:
    - python
    - cluster.py
    secretRef: collector-secrets
  - name: lyricist-cronjob
    component: collector
    schedule: '10 5 * * *'
    suspend: true
    image:
      repository: ghcr.io/byrmsh/portfolio-lyricist
      tag: 6f55bdd9371149c70255b433b9c4f5f37eb2f7a6
      pullPolicy: Always
    command:
    - python
    - lyricist.py
    secretRef: lyricist-secrets
