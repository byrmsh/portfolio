{{- if .Values.upworkerBot.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: upworker-bot-deployment
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ include "portfolio.appLabel" . }}
    component: upworker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "portfolio.appLabel" . }}
      component: upworker
      workload: upworker-bot
  template:
    metadata:
      labels:
        app: {{ include "portfolio.appLabel" . }}
        component: upworker
        workload: upworker-bot
    spec:
      containers:
        - name: upworker-bot
          image: "{{ .Values.upworkerBot.image.repository }}:{{ .Values.upworkerBot.image.tag }}"
          imagePullPolicy: {{ .Values.upworkerBot.image.pullPolicy }}
          env:
            - name: REDIS_URL
              value: {{ .Values.upworkerBot.env.redisUrl | quote }}
            - name: PORT
              value: {{ .Values.upworkerBot.env.port | quote }}
          envFrom:
            - secretRef:
                name: {{ .Values.upworkerBot.secretRef }}
          ports:
            - name: http
              containerPort: 3000
          resources:
            {{- toYaml .Values.upworkerBot.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
{{- end }}
