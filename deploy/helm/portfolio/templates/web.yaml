apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-deployment
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ include "portfolio.appLabel" . }}
    component: web
spec:
  replicas: {{ .Values.web.replicas }}
  selector:
    matchLabels:
      app: {{ include "portfolio.appLabel" . }}
      component: web
  template:
    metadata:
      labels:
        app: {{ include "portfolio.appLabel" . }}
        component: web
    spec:
      containers:
        - name: web
          image: "{{ .Values.web.image.repository }}:{{ .Values.web.image.tag }}"
          imagePullPolicy: {{ .Values.web.image.pullPolicy }}
          env:
            - name: HOST
              value: {{ .Values.web.env.host | quote }}
            - name: PORT
              value: {{ .Values.web.env.port | quote }}
            - name: API_ORIGIN
              value: {{ .Values.web.env.apiOrigin | quote }}
          ports:
            - name: http
              containerPort: 8080
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 30
            periodSeconds: 2
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: web-service
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ include "portfolio.appLabel" . }}
    component: web
spec:
  type: ClusterIP
  selector:
    app: {{ include "portfolio.appLabel" . }}
    component: web
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: http
