apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deployment
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ include "portfolio.appLabel" . }}
    component: api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app: {{ include "portfolio.appLabel" . }}
      component: api
  template:
    metadata:
      labels:
        app: {{ include "portfolio.appLabel" . }}
        component: api
    spec:
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          env:
            - name: REDIS_URL
              value: {{ .Values.api.env.redisUrl | quote }}
            - name: PORT
              value: {{ .Values.api.env.port | quote }}
          ports:
            - name: http
              containerPort: 3000
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 30
            periodSeconds: 2
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ include "portfolio.appLabel" . }}
    component: api
spec:
  type: ClusterIP
  selector:
    app: {{ include "portfolio.appLabel" . }}
    component: api
  ports:
    - name: http
      protocol: TCP
      port: 3000
      targetPort: http
