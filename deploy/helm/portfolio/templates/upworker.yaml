{{- if .Values.upworker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: upworker-deployment
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ include "portfolio.appLabel" . }}
    component: upworker
    workload: upworker
spec:
  replicas: {{ .Values.upworker.replicas }}
  selector:
    matchLabels:
      app: {{ include "portfolio.appLabel" . }}
      component: upworker
      workload: upworker
  template:
    metadata:
      labels:
        app: {{ include "portfolio.appLabel" . }}
        component: upworker
        workload: upworker
    spec:
      containers:
        - name: upworker
          image: "{{ .Values.upworker.image.repository }}:{{ default (include "portfolio.imageTag" .) .Values.upworker.image.tag }}"
          imagePullPolicy: {{ default (include "portfolio.imagePullPolicy" .) .Values.upworker.image.pullPolicy }}
          env:
            - name: REDIS_URL
              value: {{ .Values.upworker.env.redisUrl | quote }}
            - name: REDIS_STREAM_KEY
              value: {{ .Values.upworker.env.streamKey | quote }}
            - name: REDIS_STREAM_MAXLEN
              value: {{ .Values.upworker.env.streamMaxlen | quote }}
            - name: UPWORK_HEALTH_ENABLED
              value: "true"
            - name: UPWORK_HEALTH_PORT
              value: {{ .Values.upworker.env.healthPort | quote }}
            - name: CURL_CFFI_IMPERSONATE
              value: {{ .Values.upworker.env.impersonate | quote }}
          envFrom:
            - secretRef:
                name: {{ .Values.upworker.secretRef }}
          ports:
            - name: http
              containerPort: 3000
          resources:
            {{- toYaml .Values.upworker.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
{{- end }}
