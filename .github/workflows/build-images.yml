name: build-images

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/build-images.yml
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - apps/**
      - packages/schema/**
      - packages/schema-py/**
      - packages/common-py/**
  pull_request:
    # 'labeled' allows adding the preview label to an already-open PR
    # and immediately triggering a push build for the ArgoCD preview env
    types: [opened, synchronize, reopened, labeled]
    paths:
      - .github/workflows/build-images.yml
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - apps/**
      - packages/schema/**
      - packages/schema-py/**
      - packages/common-py/**
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write
  pull-requests: read

concurrency:
  group: build-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      count: ${{ steps.matrix.outputs.count }}
      should_push: ${{ steps.push_flag.outputs.should_push }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            shared:
              - .github/workflows/build-images.yml
              - package.json
              - pnpm-lock.yaml
              - pnpm-workspace.yaml
            api:
              - apps/api/**
              - packages/schema/**
            web:
              - apps/web/**
              - packages/schema/**
            collector:
              - apps/collector/**
              - packages/schema-py/**
              - packages/common-py/**
            ankiworker:
              - apps/ankiworker/**
              - packages/schema-py/**
              - packages/common-py/**
            lyricist:
              - apps/lyricist/**
              - packages/schema-py/**
              - packages/common-py/**

      - name: Build matrix from changes
        id: matrix
        run: |
          matrix='{"include":[]}'

          add_target() {
            matrix="$(jq \
              --arg name "$1" \
              --arg image "$2" \
              --arg dockerfile "$3" \
              '.include += [{name:$name,image:$image,dockerfile:$dockerfile}]' \
              <<< "$matrix")"
          }

          shared="${{ steps.filter.outputs.shared }}"
          api="${{ steps.filter.outputs.api }}"
          web="${{ steps.filter.outputs.web }}"
          collector="${{ steps.filter.outputs.collector }}"
          ankiworker="${{ steps.filter.outputs.ankiworker }}"
          lyricist="${{ steps.filter.outputs.lyricist }}"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            shared="true"
            api="true"
            web="true"
            collector="true"
            ankiworker="true"
            lyricist="true"
          fi

          # Preview environments pin multiple workloads to a shared PR-specific tag.
          # Build all images so every required tag exists for that PR commit.
          if [[ "${{ github.event_name }}" == "pull_request" && "${{ contains(github.event.pull_request.labels.*.name, 'preview') }}" == "true" ]]; then
            shared="true"
            api="true"
            web="true"
            collector="true"
            ankiworker="true"
            lyricist="true"
          fi

          if [[ "$shared" == "true" || "$api" == "true" ]]; then
            add_target "api" "portfolio-api" "apps/api/Dockerfile"
          fi
          if [[ "$shared" == "true" || "$web" == "true" ]]; then
            add_target "web" "portfolio-web" "apps/web/Dockerfile"
          fi
          if [[ "$shared" == "true" || "$collector" == "true" ]]; then
            add_target "collector" "portfolio-collector" "apps/collector/Dockerfile"
          fi
          if [[ "$shared" == "true" || "$ankiworker" == "true" ]]; then
            add_target "ankiworker" "portfolio-ankiworker" "apps/ankiworker/Dockerfile"
          fi
          if [[ "$shared" == "true" || "$lyricist" == "true" ]]; then
            add_target "lyricist" "portfolio-lyricist" "apps/lyricist/Dockerfile"
          fi

          matrix="$(jq -c . <<< "$matrix")"
          count="$(jq '.include | length' <<< "$matrix")"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "count=$count" >> "$GITHUB_OUTPUT"

      - name: Determine push flag
        id: push_flag
        run: echo "should_push=${{ github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'preview') }}" >> "$GITHUB_OUTPUT"

  build-amd64:
    needs: changes
    if: ${{ needs.changes.outputs.count != '0' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.changes.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=sha,format=long,prefix=
            type=raw,value=main-${{ github.sha }},enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
            type=raw,value=pr-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }},enable=${{ github.event_name == 'pull_request' }}
            type=raw,value=latest,enable={{is_default_branch}}
          # Add suffix to avoid overwriting the other platform
          flavor: |
            suffix=-amd64

      - name: Regenerate OG image with latest git log
        if: matrix.name == 'web'
        run: |
          sudo apt-get install -y --no-install-recommends fonts-ibm-plex python3-pip
          pip install --quiet pillow
          python3 apps/web/scripts/gen-og-image.py \
            "$(git log --all --oneline -2 | head -1)" \
            "$(git log --all --oneline -2 | tail -1)"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: ${{ needs.changes.outputs.should_push == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}-amd64
          cache-to: type=gha,scope=${{ matrix.name }}-amd64,mode=max

  build-arm64:
    needs: changes
    if: ${{ needs.changes.outputs.count != '0' }}
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.changes.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=sha,format=long,prefix=
            type=raw,value=main-${{ github.sha }},enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
            type=raw,value=pr-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }},enable=${{ github.event_name == 'pull_request' }}
            type=raw,value=latest,enable={{is_default_branch}}
          # Add suffix to avoid overwriting the other platform
          flavor: |
            suffix=-arm64

      - name: Regenerate OG image with latest git log
        if: matrix.name == 'web'
        run: |
          sudo apt-get install -y --no-install-recommends fonts-ibm-plex python3-pip
          pip install --quiet pillow
          python3 apps/web/scripts/gen-og-image.py \
            "$(git log --all --oneline -2 | head -1)" \
            "$(git log --all --oneline -2 | tail -1)"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/arm64
          push: ${{ needs.changes.outputs.should_push == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}-arm64
          cache-to: type=gha,scope=${{ matrix.name }}-arm64,mode=max

  merge:
    needs: [changes, build-amd64, build-arm64]
    if: ${{ needs.changes.outputs.count != '0' && needs.changes.outputs.should_push == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.changes.outputs.matrix) }}
    steps:
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=sha,format=long,prefix=
            type=raw,value=main-${{ github.sha }},enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
            type=raw,value=pr-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }},enable=${{ github.event_name == 'pull_request' }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Create manifest list and push
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_tag="pr-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}"
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            base_tag="main-${{ github.sha }}"
          else
            base_tag="${{ github.sha }}"
          fi

          docker buildx imagetools create \
            $(echo "${{ steps.meta.outputs.tags }}" | awk '{print "-t " $1}') \
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${base_tag}-amd64 \
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${base_tag}-arm64
