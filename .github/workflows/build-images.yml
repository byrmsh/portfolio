name: build-images

on:
  push:
    branches: [main]
    # Avoid a bump-commit loop (the workflow below can commit values-prod.yaml).
    paths-ignore:
      - deploy/helm/portfolio/values-prod.yaml

permissions:
  contents: write
  packages: write

concurrency:
  group: build-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            image: portfolio-api
            dockerfile: apps/api/Dockerfile
          - name: web
            image: portfolio-web
            dockerfile: apps/web/Dockerfile
          - name: collector
            image: portfolio-collector
            dockerfile: apps/collector/Dockerfile
          - name: ankiworker
            image: portfolio-ankiworker
            dockerfile: apps/ankiworker/Dockerfile
          - name: lyricist
            image: portfolio-lyricist
            dockerfile: apps/lyricist/Dockerfile
          - name: upworker
            image: portfolio-upworker
            dockerfile: apps/upworker/Dockerfile
          - name: upworkerbot
            image: portfolio-upworkerbot
            dockerfile: apps/upworkerbot/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=sha,format=long,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  bump-prod-values:
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruamel.yaml
        run: python -m pip install --upgrade pip ruamel.yaml

      - name: Bump values-prod.yaml tags to this commit SHA
        run: |
          python scripts/bump-values-prod-tags.py --tag "${GITHUB_SHA}"

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- deploy/helm/portfolio/values-prod.yaml; then
            echo "No prod values change."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy/helm/portfolio/values-prod.yaml
          git commit -m "chore(deploy): bump prod image tags to ${GITHUB_SHA}"
          git push
